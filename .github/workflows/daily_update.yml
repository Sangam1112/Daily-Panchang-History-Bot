name: Daily Today Special Bot

on:
  schedule:
    # 08:28 AM IST is 02:58 AM UTC (IST = UTC + 5:30)
    - cron: '58 2 * * *'
    # 09:00 PM IST (15:30 UTC) for deletion cycle
    - cron: '30 15 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: python -m unittest test_main.py

      - name: Run Bot Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push Message ID Persistence File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_message_id.json || true
          git commit -m "Update sent_message_id.json [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push origin main || true
